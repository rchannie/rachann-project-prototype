<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rachann's Project — Mobile App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --bg2: #FFFFFF;
  --bg3: #EFEDE9;
  --bg4: #E5E2DC;
  --surface: #FFFFFF;
  --border: #E8E5DF;
  --border2: #D6D2CA;
  --text: #18181B;
  --text2: #52525B;
  --text3: #A1A1AA;
  --accent: #D4501E;
  --accent2: #F5A574;
  --accent-dim: rgba(212,80,30,.1);
  --green: #16A34A;
  --green-dim: rgba(22,163,74,.1);
  --yellow: #CA8A04;
  --yellow-dim: rgba(202,138,4,.1);
  --blue: #2563EB;
  --blue-dim: rgba(37,99,235,.1);
  --red: #DC2626;
  --red-dim: rgba(220,38,38,.1);
  --purple: #7C3AED;
  --purple-dim: rgba(124,58,237,.1);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xl: 20px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --nav-h: 68px;
  --topbar-h: 60px;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);-webkit-font-smoothing:antialiased;background:#2a2a2e}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ===== DEMO SHELL ===== */
.demo-shell {
  width:100%;height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#1c1c20;gap:20px;flex-wrap:wrap;padding:16px;overflow-y:auto;
}
.demo-label {
  font-family:var(--font-mono);font-size:11px;color:#666;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;text-align:center;
}
.phone-wrap{display:flex;flex-direction:column;align-items:center}

/* ===== PHONE FRAME ===== */
.phone {
  width:375px;height:780px;
  background:var(--bg);
  border-radius:40px;
  overflow:hidden;
  position:relative;
  border:2px solid #333;
  box-shadow:0 0 0 6px #111, 0 30px 60px rgba(0,0,0,.6);
  display:flex;flex-direction:column;
}
.phone-notch {
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:32px;background:#111;border-radius:0 0 20px 20px;
  z-index:200;
}
.phone-screen {
  flex:1;display:flex;flex-direction:column;
  padding-top:36px;overflow:hidden;
}

/* ===== STATUS BAR ===== */
.status-bar {
  height:28px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;
}
.sb-time{font-size:12px;font-weight:700;color:var(--text)}
.sb-icons{display:flex;gap:5px;align-items:center;font-size:11px;color:var(--text)}

/* ===== TOPBAR ===== */
.topbar {
  height:var(--topbar-h);display:flex;align-items:center;
  padding:0 20px;gap:12px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.topbar-back{
  width:36px;height:36px;border-radius:10px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;
}
.topbar-title{flex:1;font-size:16px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;font-family:var(--font-mono)}
.topbar-action{
  width:36px;height:36px;border-radius:10px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
  position:relative;
}
.notif-dot-sm{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--bg2)}

/* ===== SCROLLABLE CONTENT ===== */
.screen-content{flex:1;overflow-y:auto;overflow-x:hidden}
.screen-content.pad{padding:16px}
.screen-content.no-pad{padding:0}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  height:var(--nav-h);display:flex;align-items:center;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:0 8px;padding-bottom:8px;flex-shrink:0;
}
.bn-item {
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:6px 4px;border-radius:10px;
  transition:background .15s;position:relative;
}
.bn-item:active{background:var(--bg3)}
.bn-item.active .bn-icon{color:var(--accent)}
.bn-item.active .bn-label{color:var(--accent);font-weight:700}
.bn-icon{font-size:20px;color:var(--text3);line-height:1}
.bn-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.02em;text-transform:uppercase}
.bn-badge{
  position:absolute;top:4px;right:calc(50% - 18px);
  background:var(--accent);color:#fff;
  font-size:9px;font-weight:700;font-family:var(--font-mono);
  padding:1px 5px;border-radius:99px;min-width:16px;text-align:center;
}

/* ===== HERO CARD ===== */
.hero-card {
  margin:16px;border-radius:var(--radius-xl);
  background:linear-gradient(135deg, #1a1a1f 0%, #2d2d35 100%);
  padding:20px;color:#fff;position:relative;overflow:hidden;
}
.hero-card::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(212,80,30,.2);
}
.hero-card::before{
  content:'';position:absolute;bottom:-40px;right:40px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(212,80,30,.1);
}
.hc-label{font-size:10px;font-family:var(--font-mono);letter-spacing:.1em;opacity:.5;text-transform:uppercase;margin-bottom:4px}
.hc-name{font-size:20px;font-weight:800;line-height:1.1;position:relative;z-index:1}
.hc-role{font-size:11px;opacity:.5;margin-top:3px;font-family:var(--font-mono)}
.hc-stats{display:flex;gap:16px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1}
.hc-stat-val{font-size:20px;font-weight:800}
.hc-stat-label{font-size:10px;opacity:.5;font-family:var(--font-mono);text-transform:uppercase}

/* ===== SECTION TITLE ===== */
.sec-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;padding:0 16px}
.sec-title-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:12px}
.sec-title-row .title{font-size:15px;font-weight:700;color:var(--text)}
.sec-title-row .link{font-size:12px;color:var(--accent);font-weight:600}

/* ===== CARDS ===== */
.card {
  background:var(--bg2);border-radius:var(--radius);
  box-shadow:var(--shadow);margin:0 16px;
  border:1px solid var(--border);overflow:hidden;
}
.card+.card{margin-top:12px}
.card-inner{padding:16px}

/* ===== PROJECT CARD ===== */
.proj-card {
  background:var(--bg2);border-radius:var(--radius);
  border:1px solid var(--border);padding:14px;
  margin:0 16px 10px;box-shadow:var(--shadow);
}
.pc-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.pc-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.pc-sub{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:2px}
.pc-progress{margin-bottom:10px}
.pc-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-track{background:var(--bg3);border-radius:99px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--accent)}
.prog-fill.g{background:var(--green)}
.pc-milestones{display:flex;gap:4px}
.pc-ms-dot{flex:1;height:4px;border-radius:99px;background:var(--bg3)}
.pc-ms-dot.done{background:var(--green)}
.pc-ms-dot.active{background:var(--accent)}
.pc-ms-dot.revision{background:var(--yellow)}

/* ===== MILESTONE STEPS ===== */
.ms-steps{padding:0 16px}
.ms-step{
  display:flex;gap:12px;padding-bottom:20px;
  position:relative;
}
.ms-step::before{
  content:'';position:absolute;left:17px;top:34px;bottom:0;
  width:2px;background:var(--border);
}
.ms-step:last-child::before{display:none}
.ms-step-dot{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;font-family:var(--font-mono);
  position:relative;z-index:1;border:2px solid transparent;
}
.ms-step-dot.done{background:var(--green-dim);color:var(--green);border-color:rgba(22,163,74,.3)}
.ms-step-dot.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(212,80,30,.3)}
.ms-step-dot.revision{background:var(--yellow-dim);color:var(--yellow);border-color:rgba(202,138,4,.3)}
.ms-step-dot.review{background:var(--blue-dim);color:var(--blue);border-color:rgba(37,99,235,.3)}
.ms-step-dot.todo{background:var(--bg3);color:var(--text3);border-color:var(--border)}
.ms-step-content{flex:1;padding-top:5px}
.ms-step-title{font-size:13px;font-weight:700;color:var(--text)}
.ms-step-sub{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.ms-step-dead{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-top:4px}
.ms-step-dead.ov{color:var(--red)}
.ms-step-actions{display:flex;gap:6px;margin-top:8px}

/* ===== BADGES ===== */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 7px;border-radius:99px;font-size:10px;font-weight:700;
  font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.03em;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-todo{background:var(--bg3);color:var(--text3)}
.b-inprog{background:var(--blue-dim);color:var(--blue)}
.b-review{background:var(--yellow-dim);color:var(--yellow)}
.b-done{background:var(--green-dim);color:var(--green)}
.b-revision{background:var(--accent-dim);color:var(--accent)}
.b-pending{background:var(--yellow-dim);color:var(--yellow)}
.b-verified{background:var(--green-dim);color:var(--green)}
.b-addon{background:var(--purple-dim);color:var(--purple)}

/* ===== BUTTONS ===== */
.btn {
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#b84018}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-outline:active{background:var(--bg3)}
.btn-green{background:var(--green-dim);color:var(--green);border:1.5px solid rgba(22,163,74,.2)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1.5px solid rgba(220,38,38,.2)}
.btn-sm{padding:7px 13px;font-size:12px}
.btn-full{width:100%;display:flex}

/* ===== ALERT / BANNER ===== */
.alert{
  display:flex;gap:10px;padding:12px 14px;
  border-radius:10px;font-size:12px;line-height:1.5;
  margin:0 16px 12px;
}
.alert-warn{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(202,138,4,.2)}
.alert-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.alert-info{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.alert-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.alert-ico{flex-shrink:0;font-size:14px;margin-top:1px}

/* ===== CHAT ===== */
.chat-bg{background:var(--bg3);padding:12px}
.chat-day{text-align:center;font-size:10px;color:var(--text3);font-family:var(--font-mono);margin:8px 0}
.cmsg{display:flex;gap:8px;margin-bottom:10px}
.cmsg.mine{flex-direction:row-reverse}
.cmsg.mine .cbubble{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px}
.cmsg-av{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:var(--font-mono);
}
.av-client{background:var(--blue);color:#fff}
.av-designer{background:var(--green);color:#fff}
.av-admin{background:var(--accent);color:#fff}
.cbubble{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
  padding:9px 12px;font-size:12px;line-height:1.5;color:var(--text2);
  max-width:220px;
}
.cmeta{font-size:9px;color:var(--text3);font-family:var(--font-mono);margin-top:3px}
.cmsg.mine .cmeta{text-align:right}
.sys-chip{
  text-align:center;margin:6px 0;
  font-size:10px;font-family:var(--font-mono);
  background:var(--bg2);border:1px solid var(--border);
  border-radius:99px;padding:4px 12px;display:inline-block;
  margin:6px auto;display:block;width:fit-content;margin-left:auto;margin-right:auto;
}
.sys-chip.danger{background:var(--red-dim);border-color:rgba(220,38,38,.2);color:var(--red)}
.sys-chip.warn{background:var(--yellow-dim);border-color:rgba(202,138,4,.2);color:var(--yellow)}
.chat-input-row{
  display:flex;gap:8px;padding:10px 14px;
  background:var(--bg2);border-top:1px solid var(--border);
}
.chat-input{
  flex:1;background:var(--bg3);border-radius:20px;padding:9px 14px;
  font-size:13px;color:var(--text);border:1px solid var(--border);
}
.chat-send{
  width:38px;height:38px;border-radius:50%;background:var(--accent);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;
}

/* ===== REVISION METER ===== */
.rev-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:var(--bg3);border-radius:10px;
  border:1px solid var(--border);margin:0 16px 12px;
}
.rb-dots{display:flex;gap:5px}
.rb-dot{width:12px;height:12px;border-radius:3px;background:var(--bg4)}
.rb-dot.used{background:var(--accent)}
.rb-dot.last{background:var(--red)}
.rb-label{flex:1;font-size:12px;color:var(--text2)}
.rb-count{font-size:12px;font-weight:700;font-family:var(--font-mono)}

/* ===== FILE CARD ===== */
.file-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:16px;text-align:center;
  position:relative;overflow:hidden;margin:0 16px 12px;
}
.fc-wm{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-25deg);
  font-size:1.4rem;font-weight:800;color:rgba(212,80,30,.1);
  white-space:nowrap;pointer-events:none;letter-spacing:.08em;
}
.fc-icon{font-size:2rem;opacity:.3;margin-bottom:6px}
.fc-name{font-size:13px;font-weight:600;color:var(--text)}
.fc-lock{font-size:11px;color:var(--yellow);margin-top:4px;font-family:var(--font-mono)}
.fc-free{font-size:11px;color:var(--green);margin-top:4px;font-family:var(--font-mono)}

/* ===== INVOICE ===== */
.inv-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:0 16px 12px}
.inv-hd{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.inv-hd.dark{background:#1a1a1f;color:#fff}
.inv-hd.green{background:var(--green);color:#fff}
.inv-hd.gray{background:var(--text3);color:#fff}
.inv-body{padding:4px 0}
.inv-row{display:flex;justify-content:space-between;padding:8px 14px;font-size:12px;border-bottom:1px solid var(--border)}
.inv-row:last-child{border:none}
.inv-k{color:var(--text3)}
.inv-v{font-weight:600;color:var(--text)}
.inv-total{background:var(--bg3);display:flex;justify-content:space-between;padding:12px 14px;font-weight:700;font-size:13px}
.inv-amount{color:var(--accent);font-size:15px}

/* ===== UPLOAD ZONE ===== */
.upload-zone{
  border:2px dashed var(--border2);border-radius:12px;
  padding:24px;text-align:center;cursor:pointer;
  transition:all .2s;margin:0 16px 12px;background:var(--bg3);
}
.upload-zone:active{border-color:var(--accent);background:var(--accent-dim)}
.uz-icon{font-size:2rem;opacity:.3;margin-bottom:8px}
.uz-text{font-size:12px;color:var(--text3)}
.uz-text strong{color:var(--accent)}

/* ===== FORM ===== */
.form-group{margin:0 16px 14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.form-control{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);
  transition:all .15s;
}
.form-control:focus{border-color:var(--accent);background:var(--bg2);box-shadow:0 0 0 3px var(--accent-dim)}
textarea.form-control{resize:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 14px}
.form-row .form-group{margin:0}

/* ===== ESTIMATION BOX ===== */
.est-box{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:14px;margin:0 16px 14px;
}
.est-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.est-row:last-child{border:none}
.est-k{color:var(--text3)}
.est-v{font-weight:700;color:var(--text)}

/* ===== RATING STARS ===== */
.stars{display:flex;gap:4px;font-size:22px}
.star{color:var(--bg4);cursor:pointer;transition:color .1s}
.star.active{color:#FBBF24}

/* ===== SECTION CARD ===== */
.section-card{margin:0 16px 12px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.sc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px}
.sc-title{font-size:14px;font-weight:700;color:var(--text)}
.sc-body{padding:0 14px 14px}

/* ===== STAT ROW ===== */
.stat-row{display:flex;gap:10px;padding:0 16px;margin-bottom:12px}
.stat-box{
  flex:1;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:12px 10px;text-align:center;
  box-shadow:var(--shadow);
}
.stat-v{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.stat-l{font-size:9px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* ===== DIVIDER ===== */
.div{height:1px;background:var(--border);margin:0 16px 14px}

/* ===== CHIP ===== */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;font-family:var(--font-mono)}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
#toast{
  background:#1a1a1f;color:#fff;padding:10px 18px;
  border-radius:20px;font-size:12px;font-weight:600;
  opacity:0;transform:translateY(20px);
  transition:all .25s;white-space:nowrap;font-family:var(--font-mono);
}
#toast.show{opacity:1;transform:translateY(0)}

/* ===== SHEET ===== */
.sheet-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.4);
  z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;
}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg2);border-radius:24px 24px 0 0;
  padding:0 0 20px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
  z-index:501;max-height:85%;overflow-y:auto;
}
.sheet-overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--bg4);margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:800;padding:0 20px 14px;color:var(--text);border-bottom:1px solid var(--border)}

  const t = titles[page] || ['—', ''];
  document.getElementById('designer-topbar-title').textContent = t[0];
  document.getElementById('designer-topbar-sub').textContent = t[1];

  ['home','milestone','chat','profile'].forEach(id => {
    const el = document.getElementById('dbn-' + id);
    if (el) el.classList.toggle('active', page === 'd-' + id);
  });
}

// ===================== CHAT =====================
function clientSendChat() {
  const inp = document.getElementById('client-chat-input');
  if (!inp || !inp.value.trim()) return;
  const msgs = inp.closest('[style*="flex-direction:column"]').querySelector('.chat-bg');
  const el = document.createElement('div');
  el.className = 'cmsg mine';
  el.innerHTML = `<div class="cmsg-av av-client">AH</div><div><div class="cbubble">${inp.value}</div><div class="cmeta">Anda · Baru saja</div></div>`;
  msgs.appendChild(el);
  inp.value = '';
  msgs.scrollTop = msgs.scrollHeight;
}

function updateClientEst(sel) {
  const d = estData[sel.value];
  const box = document.getElementById('client-est-box');
  if (!d || !box) return;
  box.style.display = 'block';
  document.getElementById('ce-price').textContent = d.price;
  document.getElementById('ce-dp').textContent = d.dp;
  document.getElementById('ce-time').textContent = d.time;
  document.getElementById('ce-rev').textContent = d.rev;
  document.getElementById('ce-milestones').innerHTML = d.ms;
}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
